# Nixpacks configuration for Python Scraper
[phases.setup]
nixPkgs = ["python310"]
aptPkgs = ["libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxext6", "libxfixes3", "libxrandr2", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2"]

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium"]

[phases.build]
cmds = []

[start]
cmd = "python main.py"
